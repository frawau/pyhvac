name: Build wheels

on:
  release:
    types: [published]
  workflow_dispatch:   # allow manual trigger for testing

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest   # Linux x86_64 + aarch64 via QEMU

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (Linux aarch64 emulation)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: aarch64

      - name: Build wheels
        uses: pypa/cibuildwheel@v3

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: AutoPublish
      url: https://pypi.org/p/pyhvac
    permissions:
      id-token: write   # required for trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
